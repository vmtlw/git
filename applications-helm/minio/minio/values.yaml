accessKey: "minioadmin"
secretKey: "minioadmin"

replicas: 1

persistence:
  enabled: true
  size: 10Gi
  storageClass: "nfs-csi"

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"

service:
  type: ClusterIP
  port: 9000

console:
  enabled: true

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  path: /
  hosts:
    - s3-admin.vmtlw.ru
  tls: 
    - secretName: tls
      hosts:
        - s3.vmtlw.ru



consoleIngress:
  enabled: true
  ingressClassName: ~
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  path: /
  hosts:
    - s3-admin.vmtlw.ru
  tls: 
    - secretName: admin-tls
      hosts:
        - s3-admin.vmtlw.ru


