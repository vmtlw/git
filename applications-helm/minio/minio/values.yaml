replicas: 1

persistence:
  enabled: true
  size: 10Gi
  storageClass: "nfs-csi"

console:
  enabled: true
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  path: /
  hosts:
    - s3.vmtlw.ru
  tls: 
    - secretName: tls
      hosts:
        - s3.vmtlw.ru
mode: standalone

consoleIngress:
  enabled: true
  ingressClassName: ~
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  path: /
  hosts:
    - s3-admin.vmtlw.ru
  tls: 
    - secretName: admin-tls
      hosts:
        - s3-admin.vmtlw.ru


consoleService:
  type: ClusterIP
  port: "443"
